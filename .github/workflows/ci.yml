name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        emacs: ['29.4', '30.2', 'snapshot']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Emacs
        uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs }}

      - name: Set up Eask
        uses: emacs-eask/setup@master

      - name: Run CI
        run: make ci
